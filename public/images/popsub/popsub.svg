<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" fill="none">
  <rect width="600" height="320" fill="#09090b"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="80" x2="600" y2="80" stroke="#27272a" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="600" y2="160" stroke="#27272a" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="600" y2="240" stroke="#27272a" stroke-width="0.5"/>
  <line x1="150" y1="0" x2="150" y2="320" stroke="#27272a" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="320" stroke="#27272a" stroke-width="0.5"/>
  <line x1="450" y1="0" x2="450" y2="320" stroke="#27272a" stroke-width="0.5"/>

  <!-- Publisher nodes (left) -->
  <!-- Pub 1 -->
  <rect x="40" y="82" width="110" height="44" rx="8" fill="#0c1220" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="95" y="99" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">PUBLISHER</text>
  <text x="95" y="114" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e0f2fe">client_a</text>

  <!-- Pub 2 -->
  <rect x="40" y="194" width="110" height="44" rx="8" fill="#0c1220" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="95" y="211" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">PUBLISHER</text>
  <text x="95" y="226" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e0f2fe">client_b</text>

  <!-- Connecting lines from publishers to broker -->
  <line x1="150" y1="104" x2="218" y2="150" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>
  <line x1="150" y1="216" x2="218" y2="170" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>

  <!-- Arrowheads on pub side -->
  <polygon points="218,150 207,143 207,157" fill="#38bdf8" opacity="0.7"/>
  <polygon points="218,170 207,163 207,177" fill="#38bdf8" opacity="0.7"/>

  <!-- Topic labels on left connections -->
  <rect x="152" y="116" width="54" height="16" rx="4" fill="#0f172a"/>
  <text x="179" y="127" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">metrics/*</text>

  <rect x="152" y="196" width="54" height="16" rx="4" fill="#0f172a"/>
  <text x="179" y="207" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">alerts/*</text>

  <!-- Central broker -->
  <rect x="220" y="110" width="160" height="100" rx="12" fill="#0d1b2e" stroke="#818cf8" stroke-width="1.8"/>
  <!-- Glow effect -->
  <rect x="220" y="110" width="160" height="100" rx="12" fill="none" stroke="#818cf8" stroke-width="6" opacity="0.1"/>
  <text x="300" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc">WebSocket Broker</text>
  <text x="300" y="165" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#c7d2fe">PopSub</text>
  <text x="300" y="184" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">QoS-1 · JWT · sled</text>

  <!-- Connecting lines from broker to subscribers -->
  <line x1="380" y1="150" x2="448" y2="104" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>
  <line x1="380" y1="160" x2="448" y2="160" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>
  <line x1="380" y1="170" x2="448" y2="216" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>

  <!-- Arrowheads on sub side -->
  <polygon points="448,104 437,97 437,111" fill="#f472b6" opacity="0.7"/>
  <polygon points="448,160 437,153 437,167" fill="#f472b6" opacity="0.7"/>
  <polygon points="448,216 437,209 437,223" fill="#f472b6" opacity="0.7"/>

  <!-- Subscriber nodes (right) -->
  <!-- Sub 1 -->
  <rect x="450" y="82" width="110" height="44" rx="8" fill="#1a0c20" stroke="#f472b6" stroke-width="1.2"/>
  <text x="505" y="99" text-anchor="middle" font-family="monospace" font-size="9" fill="#f9a8d4">SUBSCRIBER</text>
  <text x="505" y="114" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fce7f3">svc_monitor</text>

  <!-- Sub 2 -->
  <rect x="450" y="138" width="110" height="44" rx="8" fill="#1a0c20" stroke="#f472b6" stroke-width="1.2"/>
  <text x="505" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#f9a8d4">SUBSCRIBER</text>
  <text x="505" y="170" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fce7f3">svc_logger</text>

  <!-- Sub 3 -->
  <rect x="450" y="194" width="110" height="44" rx="8" fill="#1a0c20" stroke="#f472b6" stroke-width="1.2"/>
  <text x="505" y="211" text-anchor="middle" font-family="monospace" font-size="9" fill="#f9a8d4">SUBSCRIBER</text>
  <text x="505" y="226" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fce7f3">svc_alert</text>

  <!-- Rust badge bottom-right -->
  <rect x="488" y="280" width="72" height="22" rx="6" fill="#1c1917" stroke="#f97316" stroke-width="1"/>
  <text x="524" y="295" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fb923c">⚙ Rust</text>

  <!-- WS badge -->
  <rect x="40" y="280" width="90" height="22" rx="6" fill="#0c1a2e" stroke="#38bdf8" stroke-width="1"/>
  <text x="85" y="295" text-anchor="middle" font-family="monospace" font-size="10" fill="#7dd3fc">WebSocket</text>

  <!-- Replay buffer badge -->
  <rect x="220" y="282" width="160" height="20" rx="6" fill="#0d1b2e" stroke="#818cf8" stroke-width="1"/>
  <text x="300" y="296" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">replay buffer · at-least-once</text>
</svg>
